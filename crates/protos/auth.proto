syntax = "proto3";
package mandate.v1;

import "error.proto";

// AuthService provides bot-facing authentication and onboarding helpers.
//
// ## Authentication
// Requires `x-bot-secret` header. Exposed on internal gRPC listener.
//
// ## Use Cases
// - Gift card redemption for tenant onboarding
// - Future: OAuth flows, API key rotation, etc.
service AuthService {
  // RedeemGiftCard exchanges a gift card code for tenant credentials.
  //
  // If the Telegram user doesn't have a tenant account, one is created.
  // The gift card amount is added to the tenant's balance atomically.
  //
  // ## Idempotency
  // Each gift card code can only be redeemed once. Duplicate attempts
  // return ALREADY_EXISTS error.
  //
  // ## Errors
  // - NOT_FOUND: gift card code doesn't exist
  // - ALREADY_EXISTS: code was already redeemed
  // - INTERNAL: database error
  rpc RedeemGiftCard (RedeemGiftCardRequest) returns (RedeemGiftCardResponse);

  // ResolveTelegramUser maps a Telegram user ID to their tenant and organization.
  //
  // This is used by bots to resolve user identity when they only have
  // the Telegram user ID from a message context.
  //
  // ## Resolution Strategy
  // 1. Lookup tenant via `owner_tg_user_id` in tenants table
  // 2. Lookup associated organization via pending_members or orgs table
  //
  // ## Errors
  // - NOT_FOUND: No tenant or organization associated with this Telegram user
  // - INTERNAL: database error
  rpc ResolveTelegramUser (ResolveTelegramUserRequest) returns (ResolveTelegramUserResponse);
}

// Request to redeem a gift card.
message RedeemGiftCardRequest {
  // Telegram user ID (numeric string). Used to lookup or create tenant.
  string tg_user_id = 1;

  // Gift card code in format `MANDATE-GIFT-XXXX`.
  string code = 2;
}

// Response after successful gift card redemption.
message RedeemGiftCardResponse {
  // Tenant ID (ULID format). May be newly created or existing.
  string tenant_id = 1;

  // Updated tenant balance after adding gift card amount.
  int64 new_balance_nanos = 3;

  // API token for authenticating with Edge/Server.
  // Format: `token-<64 hex chars>` (256-bit entropy).
  // Client should securely store this token.
  string api_token = 4;
}

// Request to resolve a Telegram user to tenant and organization.
message ResolveTelegramUserRequest {
  // Telegram user ID (numeric string) to resolve.
  string tg_user_id = 1;
}

// Response containing the tenant and organization associated with a Telegram user.
message ResolveTelegramUserResponse {
  // Tenant ID (UUID format) that owns this Telegram user.
  string tenant_id = 1;

  // Organization ID (ULID format) associated with this tenant.
  // If the user belongs to multiple organizations, returns the most recently created one.
  string org_id = 2;
}
