syntax = "proto3";
package mandate.v1;

import "common.proto";
import "error.proto";
import "event.proto";  // For MemberIdentity, IdentitySource, CredentialRef

// MemberService handles the group membership onboarding workflow.
//
// ## Authentication
// Requires `x-api-token` header with valid tenant token.
// Exposed on the public gRPC listener.
//
// ## Membership Flow (Telegram)
// 1. User initiates join via Telegram bot command
// 2. Bot calls SubmitPendingMember with user's cryptographic keys
// 3. Owner/Audit bot calls ListPendingMembers to review requests
// 4. Owner approves by adding member to ring (via RingService)
// 5. Owner uploads encrypted key blob (via StorageService)
//
// ## Membership Flow (Standalone)
// 1. Admin generates invite code via InviteService
// 2. User opens invite link and calls RegisterMember with invite code + keys
// 3. Owner reviews pending members (same as Telegram flow)
// 4. Owner approves by adding member to ring
//
// ## Use Cases
// - Bot submits join requests from Telegram users
// - Standalone users register via invite codes
// - Owner client reviews pending members before approval
service MemberService {
  // SubmitPendingMember registers a Telegram user's intent to join a group.
  //
  // The member remains in "pending" state until the group owner approves
  // by adding them to the ring and uploading their key blob.
  //
  // ## Idempotency
  // Submitting the same tg_user_id + group_id combination again is idempotent;
  // the existing pending_id is returned without creating a duplicate.
  //
  // ## Errors
  // - NOT_FOUND: group_id doesn't exist
  // - INVALID_ARGUMENT: malformed public key bytes
  // - INTERNAL: database error
  rpc SubmitPendingMember (SubmitPendingMemberRequest) returns (SubmitPendingMemberResponse);

  // RegisterMember registers a standalone user via invite code.
  //
  // This is the standalone mode alternative to SubmitPendingMember.
  // The invite code determines which group the user joins.
  //
  // ## Flow
  // 1. User receives invite link containing code
  // 2. User generates keypair client-side
  // 3. User calls RegisterMember with code + keys + identity info
  // 4. Server validates code, creates pending member, increments code usage
  //
  // ## Errors
  // - NOT_FOUND: invite code doesn't exist
  // - FAILED_PRECONDITION: invite code expired, exhausted, or revoked
  // - INVALID_ARGUMENT: malformed public key bytes
  // - INTERNAL: database error
  rpc RegisterMember (RegisterMemberRequest) returns (RegisterMemberResponse);

  // ListPendingMembers retrieves pending membership requests for review.
  //
  // Returns a paginated list of users awaiting owner approval.
  // Owner client uses this to display pending requests and approve/reject.
  //
  // ## Errors
  // - NOT_FOUND: group_id doesn't exist
  rpc ListPendingMembers (ListPendingMembersRequest) returns (ListPendingMembersResponse);

  // GetApprovedMemberByTgUserId retrieves an approved member's cryptographic keys
  // by their Telegram user ID.
  //
  // This is used by the audit bot for the /kick command to look up
  // a member's nazgul public key from their Telegram identity.
  //
  // ## Errors
  // - NOT_FOUND: no approved member with the given tg_user_id exists
  rpc GetApprovedMemberByTgUserId (GetApprovedMemberByTgUserIdRequest) returns (GetApprovedMemberByTgUserIdResponse);

  // ListMembers returns all approved members for a group with unified MemberInfo.
  //
  // Returns members with full identity information regardless of identity source
  // (Telegram or Standalone). Supports pagination for groups with many members.
  //
  // ## Errors
  // - NOT_FOUND: group_id doesn't exist
  // - PERMISSION_DENIED: caller is not authorized to view members
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);

  // ExportMembers exports member data in specified format (CSV or JSON).
  //
  // Admin-only RPC. Exports approved member data with selectable fields.
  // Supports filtering which fields to include in the export.
  //
  // ## Errors
  // - NOT_FOUND: group_id doesn't exist
  // - INVALID_ARGUMENT: unsupported format or invalid field names
  // - PERMISSION_DENIED: caller is not a tenant admin
  rpc ExportMembers(ExportMembersRequest) returns (ExportMembersResponse);

  // ListMemberGroups retrieves all groups that a member belongs to.
  //
  // This is used for wallet restore flow where the client needs to discover
  // its group memberships by querying with its Nazgul public key.
  //
  // ## Errors
  // - INVALID_ARGUMENT: malformed nazgul_pub (must be exactly 32 bytes)
  rpc ListMemberGroups(ListMemberGroupsRequest) returns (ListMemberGroupsResponse);
}

// Request to submit a pending member.
message SubmitPendingMemberRequest {
  // Group ID (ULID format) to join.
  string group_id = 1;

  // Telegram user ID (numeric string from Telegram API).
  string tg_user_id = 2;

  // Member's Nazgul master public key for ring signatures (32 bytes).
  // Used for anonymous voting and event signing.
  NazgulMasterPublicKey nazgul_pub = 3;

  // Member's Rage (X25519) public key for encryption (32 bytes).
  // Used to encrypt the shared key blob for this member.
  RagePublicKey rage_pub = 4;
}

// Response after submitting a pending member.
message SubmitPendingMemberResponse {
  // Server-assigned pending member ID (ULID format).
  // Used for tracking approval status.
  string pending_id = 1;
}

// Request to list pending members.
message ListPendingMembersRequest {
  // Group ID (ULID format) to query.
  string group_id = 1;

  // Maximum number of pending members to return (server may cap this).
  uint32 limit = 2;

  // Pagination cursor from previous response.
  // Pass empty/null for first page.
  PageToken page_token = 3;
}

// Pending member awaiting owner approval.
message PendingMember {
  // Pending member ID (ULID format).
  string pending_id = 1;

  // Telegram user ID (numeric string).
  string tg_user_id = 2;

  // Member's Nazgul master public key (32 bytes).
  NazgulMasterPublicKey nazgul_pub = 3;

  // Member's Rage public key (32 bytes).
  RagePublicKey rage_pub = 4;

  // Unix timestamp in milliseconds when the request was submitted.
  int64 submitted_at_ms = 5;
}

// Response containing pending members.
message ListPendingMembersResponse {
  // List of pending members in submission order.
  repeated PendingMember members = 1;

  // Pagination cursor for next page.
  // Empty if no more pages.
  PageToken next_page_token = 2;
}

// Request to get an approved member by Telegram user ID.
message GetApprovedMemberByTgUserIdRequest {
  // Group ID (ULID format) to query.
  string group_id = 1;

  // Telegram user ID (numeric string from Telegram API).
  string tg_user_id = 2;
}

// Response containing the approved member's cryptographic keys.
message GetApprovedMemberByTgUserIdResponse {
  // The approved member's information (same structure as PendingMember).
  // Contains nazgul_pub and rage_pub for ring operations.
  PendingMember member = 1;
}

// ============================================================================
// Standalone Registration (Phase 2)
// ============================================================================
// Note: IdentitySource, MemberIdentity, CredentialRef are defined in event.proto
// and imported at the top of this file.

// Request to register a standalone member via invite code.
message RegisterMemberRequest {
  // Invite code from the invite link (required).
  // The code determines which group to join.
  string invite_code = 1;

  // Member's Nazgul master public key for ring signatures (32 bytes).
  NazgulMasterPublicKey nazgul_pub = 2;

  // Member's Rage (X25519) public key for encryption (32 bytes).
  RagePublicKey rage_pub = 3;

  // Member identity information (required).
  MemberIdentity identity = 4;
}

// Response after registering a standalone member.
message RegisterMemberResponse {
  // Server-assigned pending member ID (ULID format).
  string pending_id = 1;

  // Group ID that the member will join (derived from invite code).
  string group_id = 2;

  // Current status: "pending" (awaiting owner approval).
  string status = 3;
}

// =============================================================================
// Phase 4: Member Management Enhancement
// =============================================================================

// Unified member information for both Telegram and Standalone members.
message MemberInfo {
  // Member's cryptographic public key (Nazgul master public key).
  bytes nazgul_pub = 1;

  // Unified identity information.
  // Contains external_id, display_name, organization_id, credential_ref, and source.
  MemberIdentity identity = 2;

  // Member status.
  // Possible values: "pending", "approved", "banned"
  string status = 3;

  // Unix timestamp in milliseconds when member joined the group.
  uint64 joined_at = 4;
}

// Request to list approved members in a group.
message ListMembersRequest {
  // Group ID (ULID format) to list members for.
  string group_id = 1;

  // Maximum number of members to return (server may cap this).
  // Recommended: 50. Maximum: 100.
  uint32 limit = 2;

  // Pagination cursor from previous response.
  // Pass empty/null for first page.
  PageToken page_token = 3;

  // Optional filter by identity source.
  // If not specified, returns all members regardless of source.
  optional IdentitySource filter_source = 4;

  // Optional filter by status.
  // If not specified, returns only "approved" members.
  optional string filter_status = 5;
}

// Response containing list of members.
message ListMembersResponse {
  // List of members matching the criteria.
  repeated MemberInfo members = 1;

  // Pagination cursor for next page.
  // Empty if no more pages.
  PageToken next_page_token = 2;

  // Total count of members matching criteria (for UI display).
  uint32 total_count = 3;
}

// Request to export member data.
message ExportMembersRequest {
  // Group ID (ULID format) to export members from.
  string group_id = 1;

  // Export format.
  // Supported values: "csv", "json"
  string format = 2;

  // Fields to include in export.
  // Available fields: "external_id", "display_name", "organization_id",
  // "credential_status", "joined_at", "status", "identity_source"
  // If empty, exports all available fields.
  repeated string include_fields = 3;

  // Optional filter by identity source.
  optional IdentitySource filter_source = 4;

  // Optional filter by status.
  // If not specified, exports only "approved" members.
  optional string filter_status = 5;
}

// Response containing exported member data.
message ExportMembersResponse {
  // Exported data in the requested format.
  // For "csv": CSV string with header row
  // For "json": JSON array of member objects
  string data = 1;

  // Number of members exported.
  uint32 member_count = 2;

  // Export timestamp (Unix milliseconds).
  uint64 exported_at = 3;
}

// =============================================================================
// ListMemberGroups (Wallet Restore)
// =============================================================================

// Request to list all groups that a member belongs to.
message ListMemberGroupsRequest {
  // Member's Nazgul master public key (32 bytes).
  bytes nazgul_pub = 1;

  // Maximum number of groups to return (server may cap this).
  uint32 limit = 2;

  // Pagination cursor from previous response.
  // Pass empty/null for first page.
  PageToken page_token = 3;

  // Optional filter by membership status.
  // If not specified, returns only "approved" members.
  // Possible values: "pending", "approved", "removed", "banned"
  optional string filter_status = 4;
}

// Summary of a member's group membership.
message GroupMembership {
  // Group ID (ULID format).
  string group_id = 1;

  // Unix timestamp in milliseconds when the member joined.
  int64 joined_at = 2;

  // Membership status: "pending", "approved", "removed", "banned"
  string status = 3;
}

// Response containing list of groups.
message ListMemberGroupsResponse {
  // List of groups the member belongs to.
  repeated GroupMembership groups = 1;

  // Pagination cursor for next page.
  // Empty if no more pages.
  PageToken next_page_token = 2;

  // Total count of groups matching criteria.
  uint32 total_count = 3;
}
