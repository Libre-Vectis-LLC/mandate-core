syntax = "proto3";
package mandate.v1;

import "common.proto";
import "error.proto";

service BillingService {
  rpc TransferToGroup (TransferToGroupRequest) returns (TransferToGroupResponse);
  rpc GetGroupBalance (GetGroupBalanceRequest) returns (GetGroupBalanceResponse);
}

message TransferToGroupRequest {
  string tenant_id = 1;
  string group_id = 2;
  int64 amount_nanos = 3;
}

message TransferToGroupResponse {
  int64 balance_after_nanos = 1;
}

message GetGroupBalanceRequest {
  string group_id = 1; // ULID
}

message GetGroupBalanceResponse {
  int64 balance_nanos = 1;
}
