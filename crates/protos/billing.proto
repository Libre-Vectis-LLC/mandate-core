syntax = "proto3";
package mandate.v1;

import "common.proto";
import "error.proto";

// BillingService manages tenant-to-organization fund transfers and balance queries.
//
// ## Authentication
// Requires `x-api-token` header with valid tenant token.
// Exposed on the public gRPC listener.
//
// ## Use Cases
// - Transfer credits from tenant account to organization budget
// - Query organization balance for display or pre-flight checks
// - Withdraw unused credits from organization back to tenant
// - Transfer credits between organizations within same tenant
service BillingService {
  // GetTenantBalance retrieves the current credit balance for a tenant.
  //
  // ## Authorization
  // Tenant ID is derived from the authenticated x-api-token.
  //
  // ## Errors
  // - UNAUTHENTICATED: missing or invalid x-api-token
  // - NOT_FOUND: tenant doesn't exist
  rpc GetTenantBalance (GetTenantBalanceRequest) returns (GetTenantBalanceResponse);

  // GetOrganizationBalance retrieves the current credit balance for an organization.
  //
  // ## Errors
  // - NOT_FOUND: org_id doesn't exist
  rpc GetOrganizationBalance (GetOrganizationBalanceRequest) returns (GetOrganizationBalanceResponse);

  // TransferToOrganization moves funds from tenant balance to a organization's budget.
  //
  // The transfer is atomic: either the full amount moves or nothing does.
  // Uses SERIALIZABLE isolation to prevent race conditions on concurrent transfers.
  //
  // ## Authorization
  // Caller must own the tenant account being debited.
  //
  // ## Errors
  // - INVALID_ARGUMENT: amount_nanos is zero or negative
  // - FAILED_PRECONDITION: insufficient tenant balance
  // - NOT_FOUND: tenant_id or org_id doesn't exist
  // - INTERNAL: database transaction failed
  rpc TransferToOrganization (TransferToOrganizationRequest) returns (TransferToOrganizationResponse);

  // WithdrawFromOrganization moves funds from a organization's budget back to tenant balance.
  //
  // The withdrawal is atomic and uses SERIALIZABLE isolation.
  //
  // ## Authorization
  // Caller must own the tenant that owns the organization.
  //
  // ## Errors
  // - INVALID_ARGUMENT: amount_nanos is zero or negative
  // - FAILED_PRECONDITION: insufficient organization balance
  // - NOT_FOUND: org_id doesn't exist or caller doesn't own it
  // - INTERNAL: database transaction failed
  rpc WithdrawFromOrganization (WithdrawFromOrganizationRequest) returns (WithdrawFromOrganizationResponse);

  // TransferBetweenOrganizations moves funds between two organizations owned by the same tenant.
  //
  // The transfer is atomic and uses SERIALIZABLE isolation.
  //
  // ## Authorization
  // Caller must own both source and destination organizations.
  //
  // ## Errors
  // - INVALID_ARGUMENT: amount_nanos is zero or negative, or organizations are the same
  // - FAILED_PRECONDITION: insufficient balance in source organization
  // - NOT_FOUND: either organization doesn't exist or caller doesn't own both
  // - INTERNAL: database transaction failed
  rpc TransferBetweenOrganizations (TransferBetweenOrganizationsRequest) returns (TransferBetweenOrganizationsResponse);
}

// Request to transfer funds from tenant to organization.
message TransferToOrganizationRequest {
  // Tenant ID (ULID format) whose balance will be debited.
  string tenant_id = 1;

  // Target organization ID (ULID format) to receive the funds.
  string org_id = 2;

  // Amount to transfer in nanoUnits (1 unit = 1,000,000,000 nanos).
  // Must be positive; zero or negative values return INVALID_ARGUMENT.
  int64 amount_nanos = 3;

  // Optional idempotency key for safely retrying this transfer.
  // If provided, repeated requests with the same key return the cached result
  // instead of executing the transfer again. Keys are valid for 24 hours.
  // Recommended format: UUID v4 or ULID generated by client.
  optional string idempotency_key = 4;
}

// Response after successful transfer.
message TransferToOrganizationResponse {
  // Updated organization balance after adding the transferred amount.
  int64 balance_after_nanos = 1;
}

// Request to query an organization's current balance.
message GetOrganizationBalanceRequest {
  // Organization ID (ULID format) to query.
  string org_id = 1;
}

// Response containing the organization's balance.
message GetOrganizationBalanceResponse {
  // Current organization balance in nanoUnits.
  int64 balance_nanos = 1;
}

// Request to query tenant's current balance.
// Tenant ID is derived from authentication token.
message GetTenantBalanceRequest {
  // Empty - tenant is identified by x-api-token
}

// Response containing the tenant's balance.
message GetTenantBalanceResponse {
  // Current tenant balance in nanoUnits.
  int64 balance_nanos = 1;

  // Timestamp of last balance update (Unix milliseconds).
  uint64 updated_at = 2;
}

// Request to withdraw funds from organization back to tenant.
message WithdrawFromOrganizationRequest {
  // Source organization ID (ULID format) to withdraw from.
  string org_id = 1;

  // Amount to withdraw in nanoUnits.
  // Must be positive; zero or negative values return INVALID_ARGUMENT.
  int64 amount_nanos = 2;
}

// Response after successful withdrawal.
message WithdrawFromOrganizationResponse {
  // Transfer ID for audit trail (ULID format).
  string transfer_id = 1;

  // Amount withdrawn in nanoUnits.
  int64 amount_nanos = 2;

  // Timestamp of withdrawal (Unix seconds).
  uint64 timestamp = 3;
}

// Request to transfer funds between two organizations.
message TransferBetweenOrganizationsRequest {
  // Source organization ID (ULID format) to debit.
  string from_org_id = 1;

  // Destination organization ID (ULID format) to credit.
  string to_org_id = 2;

  // Amount to transfer in nanoUnits.
  // Must be positive; zero or negative values return INVALID_ARGUMENT.
  int64 amount_nanos = 3;
}

// Response after successful inter-organization transfer.
message TransferBetweenOrganizationsResponse {
  // Transfer ID for audit trail (ULID format).
  string transfer_id = 1;

  // Amount transferred in nanoUnits.
  int64 amount_nanos = 2;

  // Timestamp of transfer (Unix seconds).
  uint64 timestamp = 3;
}
