syntax = "proto3";
package mandate.v1;

import "common.proto";
import "error.proto";

service EventService {
  // Push a signed event to the server (bytes are canonical, include signature).
  rpc PushEvent (PushEventRequest) returns (PushEventResponse);

  // Fetch a single page of events for a group, starting after an exclusive sequence.
  // The server sends one response then closes the stream; an empty batch means no new events.
  rpc StreamEvents (StreamEventsRequest) returns (stream StreamEventsResponse);
}

message PushEventRequest {
  bytes event_bytes = 1;
}

message PushEventResponse {
  Ulid event_ulid = 1;
  Hash32 event_hash = 2;
  int64 sequence_no = 3;
}

message StreamEventsRequest {
  string group_id = 1;       // ULID
  int64 start_sequence_no = 2; // exclusive (start > this); use -1 to start from beginning
  uint32 limit = 3;            // server clamps to configured max
}

message StreamEventsResponse {
  repeated bytes event_bytes = 1; // batch to reduce per-message overhead
  // Storage-assigned sequence numbers aligned with event_bytes to allow clients
  // to resume with start_sequence_no.
  repeated int64 sequence_nos = 2;
}
