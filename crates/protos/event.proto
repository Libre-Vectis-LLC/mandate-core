syntax = "proto3";
package mandate.v1;

import "common.proto";
import "error.proto";

// Identity source enumeration
// Indicates how a member was onboarded into the system
enum IdentitySource {
  IDENTITY_SOURCE_UNKNOWN = 0;    // Reserved for proto default, should not be used
  IDENTITY_SOURCE_TELEGRAM = 1;   // Telegram-based identity (default for backward compatibility)
  IDENTITY_SOURCE_STANDALONE = 2; // Standalone mode identity (invite-based registration)
  IDENTITY_SOURCE_OTHER = 3;      // Other identity sources (reserved for future use)
}

// Reference to a verified credential
// Links member identity to externally verified credentials (government ID, org membership, etc.)
message CredentialRef {
  string credential_id = 1;       // Credential ID in ULID format
  string credential_type = 2;     // Credential type: "government_id", "org_membership", "custom", etc.
  uint64 verified_at = 3;         // Unix timestamp (milliseconds) when the credential was verified
}

// Unified member identity metadata
// Embedded in RingOperation::AddMember events, covered by ring signature
// All fields except 'source' are optional to support different onboarding modes
message MemberIdentity {
  optional string external_id = 1;      // External identity identifier:
                                        // - Telegram: tg_user_id (e.g., "123456789")
                                        // - Standalone: standalone_user_id (ULID)
  optional string display_name = 2;     // User's display name (tg_username or custom name)
  reserved 3;                           // was: organization_id (merged into external_id)
  optional CredentialRef credential_ref = 4; // Reference to verified credential (if any)
  IdentitySource source = 5;            // Required: identity source (Telegram, Standalone, or Other)
}

// EventService handles the append-only event log for organization coordination.
//
// ## Authentication
// Requires `x-api-token` header with valid tenant token.
// Exposed on the public gRPC listener (Edge-cacheable for reads).
//
// ## Event Model
// Events are cryptographically signed and stored in canonical byte format.
// Each event receives a monotonically increasing sequence number within its organization.
// The event log is append-only and immutable once committed.
//
// ## Use Cases
// - Clients push signed coordination events (votes, proposals, etc.)
// - Clients sync event history via paginated streaming
service EventService {
  // PushEvent appends a signed event to the organization's event log.
  //
  // The event_bytes must be in canonical format with embedded signature.
  // Server validates signature, assigns sequence number, and returns confirmation.
  //
  // ## Idempotency
  // Events are deduplicated by content hash. Pushing the same event twice
  // returns the existing event's metadata without creating a duplicate.
  //
  // ## Errors
  // - INVALID_ARGUMENT: malformed event_bytes or invalid signature
  // - PERMISSION_DENIED: signer not authorized for this organization
  // - INTERNAL: storage write failed
  rpc PushEvent (PushEventRequest) returns (PushEventResponse);

  // StreamEvents fetches a page of events for an organization starting after a sequence.
  //
  // Returns a stream that sends one response containing a batch of events,
  // then closes. An empty batch indicates no new events after the given sequence.
  // Clients should poll periodically or use the sequence number for resumption.
  //
  // ## Pagination
  // Use `start_sequence_no = -1` to begin from the first event.
  // The response includes sequence numbers for each event to enable resumption.
  //
  // ## Errors
  // - NOT_FOUND: org_id doesn't exist
  // - INVALID_ARGUMENT: limit exceeds server maximum
  rpc StreamEvents (StreamEventsRequest) returns (stream StreamEventsResponse);

  // GetPollResults fetches aggregated voting results for a poll event.
  //
  // Requires the poll_key for authorization. This key is derived from the
  // event creator's shared secret and allows read-only access to poll results.
  // The poll_key is typically embedded in the event_url and passed via query parameter.
  //
  // ## Authentication
  // The poll_key serves as a capability token - anyone with this key can view results.
  // The key is intentionally shareable to enable anonymous result viewing via Tor.
  //
  // ## Errors
  // - NOT_FOUND: event_ulid doesn't exist or is not a poll event
  // - PERMISSION_DENIED: invalid poll_key
  // - INVALID_ARGUMENT: malformed org_id or event_ulid
  rpc GetPollResults (GetPollResultsRequest) returns (GetPollResultsResponse);

  // GetPollBundle fetches complete poll data for external audit.
  //
  // Returns the complete poll event, all vote events, and cryptographic metadata
  // needed for independent verification. This enables external auditors to verify
  // ring signatures and vote tallying without trusting the server.
  //
  // ## Authentication
  // Requires the poll_key (same as GetPollResults). The poll_key serves as a
  // capability token - anyone with this key can download the complete bundle.
  //
  // ## Use Cases
  // - External cryptographic verification of poll results
  // - Archival and offline analysis
  // - Independent auditing by third parties
  //
  // ## Errors
  // - NOT_FOUND: event_ulid doesn't exist or is not a poll event
  // - PERMISSION_DENIED: invalid poll_key
  // - INVALID_ARGUMENT: malformed org_id or event_ulid
  rpc GetPollBundle (GetPollBundleRequest) returns (GetPollBundleResponse);
}

// Request to push a signed event.
message PushEventRequest {
  // Canonical event bytes including embedded ring signature.
  // Format: [event_header | event_payload | signature]
  bytes event_bytes = 1;

  // Optional proof-of-work submission when required by Edge.
  // Only needed when organization is under attack and POW defense is active.
  optional PowSubmission pow_submission = 2;
}

// Response after successful event push.
message PushEventResponse {
  // Server-assigned event ID (ULID format, globally unique).
  Ulid event_ulid = 1;

  // SHA3-256 hash of the canonical event bytes.
  Hash32 event_hash = 2;

  // Monotonically increasing sequence number within the organization.
  // Used for ordering and resumption during streaming.
  int64 sequence_no = 3;

  // Optional Onion URL for anonymous result viewing (only set by Edge for poll events).
  // Format: http://<onion-address>.onion/events/<event_ulid>?key=<poll_key>
  // Enables Tor-based access to poll results without revealing IP address.
  optional string event_url = 4;
}

// Request to stream events from an organization.
message StreamEventsRequest {
  // Organization ID (ULID format) to stream events from.
  string org_id = 1;

  // Exclusive lower bound: returns events with sequence_no > start_sequence_no.
  // Use -1 to start from the beginning of the event log.
  int64 start_sequence_no = 2;

  // Maximum number of events per response batch.
  // Server clamps to configured maximum (typically 100-1000).
  uint32 limit = 3;
}

// Response containing a batch of events.
message StreamEventsResponse {
  // Batch of canonical event bytes (same format as PushEventRequest).
  // Batching reduces per-message RPC overhead for bulk syncs.
  repeated bytes event_bytes = 1;

  // Sequence numbers aligned 1:1 with event_bytes.
  // Clients should track the highest sequence for resumption.
  repeated int64 sequence_nos = 2;
}

// Proof-of-work submission attached to PushEventRequest when POW defense is active.
//
// POW is triggered per-organization when signature verification failures exceed threshold,
// indicating potential attack or abuse. Clients must compute and submit valid POW
// bundle to have their events accepted during this defensive state.
message PowSubmission {
  // Bincode-serialized ProofBundle (from rspow crate).
  // Contains N proofs (each with 'bits' difficulty), where N = required_proofs.
  bytes proof_bundle = 1;

  // Unix timestamp (seconds) when client computed the proof.
  // Must fall within server's time_window_secs from challenge issuance.
  int64 timestamp = 2;

  // Challenge bytes provided by Edge in previous error response.
  // Server deterministically computes this challenge (stateless design).
  bytes challenge = 3;

  // Client-generated random nonce (32 bytes).
  // Used for replay protection - each submission must have a unique nonce.
  // Server uses this to detect and reject duplicate submissions.
  bytes client_nonce = 4;
}

// POW challenge parameters returned in error response when POW is required.
//
// Included in RESOURCE_EXHAUSTED status details when Edge rejects event
// due to missing or invalid POW submission. Client must solve POW and retry.
message PowChallenge {
  // Difficulty bits per individual proof (typically 7-10 bits).
  uint32 bits = 1;

  // Number of proofs required in the bundle (may escalate during sustained attack).
  // Initial multiplier is 3.0x, can grow linearly or exponentially based on strategy.
  uint32 required_proofs = 2;

  // Time window (seconds) within which POW solution remains valid.
  // Submissions outside this window are rejected to prevent replay attacks.
  uint64 time_window_secs = 3;

  // Legacy alias for the server-issued deterministic nonce.
  // Kept populated during migration so older clients can still decode the challenge.
  bytes challenge = 4;

  // Server-issued deterministic nonce used by rspow's near-stateless binding model.
  bytes deterministic_nonce = 5;

  // Server timestamp used to derive the deterministic nonce.
  uint64 timestamp = 6;
}

// Request to get aggregated poll results.
message GetPollResultsRequest {
  // Organization ID (ULID format) containing the poll event.
  string org_id = 1;

  // Event ID (ULID format) of the poll to retrieve results for.
  Ulid event_ulid = 2;

  // Capability token for result access (derived from creator's shared secret).
  // Anyone with this key can view results anonymously.
  string poll_key = 3;
}

// Response containing aggregated poll results.
message GetPollResultsResponse {
  // Poll question or title.
  string question = 1;

  // Unix timestamp (seconds) when poll was created.
  int64 created_at = 2;

  // Poll options with aggregated vote counts.
  repeated PollOption options = 3;

  // Total number of votes cast (sum of all option vote counts).
  uint32 total_votes = 4;

  // Ring hash at poll creation time (ensures votes are from valid snapshot).
  Hash32 ring_hash = 5;

  // Whether poll is still accepting votes (based on deadline or manual closure).
  bool is_open = 6;
}

// Single poll option with aggregated vote count.
message PollOption {
  // Option index (0-based, matches option order in poll creation event).
  uint32 index = 1;

  // Option label or description.
  string label = 2;

  // Number of votes received for this option.
  uint32 vote_count = 3;
}

// Request to download complete poll bundle for external audit.
message GetPollBundleRequest {
  // Organization ID (ULID format) containing the poll event.
  string org_id = 1;

  // Event ID (ULID format) of the poll to download bundle for.
  Ulid event_ulid = 2;

  // Capability token for bundle access (derived from creator's shared secret).
  // Same authentication as GetPollResults.
  string poll_key = 3;
}

// Response containing complete poll data for external verification.
message GetPollBundleResponse {
  // Organization ID (ULID format).
  string org_id = 1;

  // Poll event ID (ULID format).
  string poll_id = 2;

  // Poll event ULID in string format.
  string poll_event_ulid = 3;

  // SHA3-256 hash of the poll event (hex-encoded).
  string poll_hash_hex = 4;

  // Ring hash at poll creation time (hex-encoded).
  string ring_hash_hex = 5;

  // Poll access key (hex-encoded, for re-verification).
  string poll_key_hex = 6;

  // Poll key in age-secret format (for decryption tools).
  string poll_key_age_secret = 7;

  // Total number of votes in this bundle.
  uint32 vote_count = 8;

  // Canonical poll event bytes (same format as PushEventRequest).
  bytes poll_event_bytes = 9;

  // JSON representation of poll event (for human readability).
  string poll_event_json = 10;

  // All vote events for this poll, ordered by sequence number.
  repeated PollVoteData votes = 11;
}

// Single vote event data within a poll bundle.
message PollVoteData {
  // Vote event ID (ULID format).
  string event_ulid = 1;

  // Sequence number of this vote event in the organization.
  int64 sequence_no = 2;

  // Key image from ring signature (hex-encoded, for double-vote detection).
  string key_image_hex = 3;

  // Canonical vote event bytes.
  bytes event_bytes = 4;

  // JSON representation of vote event (for human readability).
  string event_json = 5;
}
