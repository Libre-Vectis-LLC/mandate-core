syntax = "proto3";
package mandate.v1;

import "common.proto";
import "error.proto";

// StorageService manages encrypted key blobs for organization members.
//
// ## Authentication
// Requires `x-api-token` header with valid tenant token.
// Exposed on the public gRPC listener (heavily Edge-cached for reads).
//
// ## Key Blob Model
// Each member receives an encrypted "bucket" containing the organization's shared
// cryptographic material (K_shared). The blob is encrypted to the member's
// Rage (X25519) public key, ensuring only they can decrypt it.
//
// ## Hot Path
// DownloadMyKeyBlob is the most frequently called RPC (once per session per member).
// Edge caching by rage_pub hash is critical for performance at scale.
//
// ## Use Cases
// - Owner uploads key blobs after approving new members
// - Member downloads their blob to derive session keys
// - Server uploads access token blobs after ring changes
// - Member downloads access token blob to authenticate reads at Edge
// - Edge fetches raw access token to enforce read access control
service StorageService {
  // UploadKeyBlobs stores encrypted key material for one or more members.
  //
  // The owner generates key blobs by encrypting K_shared to each member's
  // Rage public key using age/rage encryption.
  //
  // ## Authorization
  // Only the organization owner can upload blobs.
  //
  // ## Atomicity
  // All blobs in a single request are stored atomically.
  //
  // ## Errors
  // - NOT_FOUND: org_id doesn't exist
  // - PERMISSION_DENIED: caller is not the organization owner
  // - INVALID_ARGUMENT: empty blob list or malformed public keys
  rpc UploadKeyBlobs (UploadKeyBlobsRequest) returns (UploadKeyBlobsResponse);

  // DownloadMyKeyBlob retrieves a member's encrypted key blob.
  //
  // Members identify themselves by their Rage public key.
  // The blob can only be decrypted by the corresponding private key.
  //
  // ## Caching
  // This endpoint is aggressively cached at the Edge layer.
  // Cache key: SHA3(org_id || rage_pub).
  //
  // ## Errors
  // - NOT_FOUND: org_id or rage_pub not found (member not yet approved)
  rpc DownloadMyKeyBlob (DownloadMyKeyBlobRequest) returns (DownloadMyKeyBlobResponse);

  // UploadAccessTokenBlobs stores encrypted Edge access tokens for members.
  //
  // Generated by the server after every RingUpdate event. Each member
  // receives the same EdgeAccessToken encrypted to their Rage public key.
  // Removed members are excluded, preventing them from reading events.
  //
  // ## Authorization
  // Internal server operation (triggered by RingUpdate processing).
  //
  // ## Atomicity
  // All blobs in a single request are stored atomically.
  //
  // ## Errors
  // - NOT_FOUND: org_id doesn't exist
  // - INVALID_ARGUMENT: empty blob list or malformed public keys
  rpc UploadAccessTokenBlobs (UploadAccessTokenBlobsRequest) returns (UploadAccessTokenBlobsResponse);

  // DownloadMyAccessTokenBlob retrieves a member's encrypted access token.
  //
  // Members identify themselves by their Rage public key.
  // The blob can only be decrypted by the corresponding private key.
  // The decrypted token is included as `x-edge-access-token` gRPC metadata
  // on subsequent read RPCs (StreamEvents, GetRingHead, etc.).
  //
  // ## Bootstrap Exception
  // This RPC does NOT require the access token itself (avoids chicken-and-egg).
  //
  // ## Caching
  // Cached at Edge layer. Cache key: SHA3("at" || org_id || rage_pub).
  //
  // ## Errors
  // - NOT_FOUND: org_id or rage_pub not found, or no token generated yet
  rpc DownloadMyAccessTokenBlob (DownloadMyAccessTokenBlobRequest) returns (DownloadMyAccessTokenBlobResponse);

  // GetEdgeAccessToken returns the raw access token for Edge enforcement.
  //
  // Called by Edge when it detects a ring_hash change (via GetRingHead).
  // Edge uses the returned token to validate `x-edge-access-token` metadata
  // on client read requests.
  //
  // ## Authentication
  // Requires `x-api-token` header (tenant-level, same as other RPCs).
  //
  // ## Grace Period
  // Returns both current and previous tokens. Edge should accept both
  // during a configurable grace period to handle rotation lag.
  //
  // ## Errors
  // - NOT_FOUND: org_id doesn't exist or no token generated yet
  rpc GetEdgeAccessToken (GetEdgeAccessTokenRequest) returns (GetEdgeAccessTokenResponse);
}

// An encrypted key blob for a specific member.
message KeyBlob {
  // Member's Rage (X25519) public key (32 bytes).
  // Used as the lookup key and encryption recipient.
  RagePublicKey rage_pub = 1;

  // Age/Rage-encrypted ciphertext containing K_shared and organization metadata.
  // Only decryptable by the holder of the corresponding private key.
  bytes blob = 2;
}

// Request to upload key blobs.
message UploadKeyBlobsRequest {
  // Organization ID (ULID format) to upload blobs for.
  string org_id = 1;

  // List of key blobs to store (one per member).
  // Existing blobs for the same rage_pub are overwritten.
  repeated KeyBlob blobs = 2;
}

// Empty response indicating successful upload.
message UploadKeyBlobsResponse {}

// Request to download a member's key blob.
message DownloadMyKeyBlobRequest {
  // Organization ID (ULID format) to download from.
  string org_id = 1;

  // Member's Rage public key (32 bytes) identifying the blob to fetch.
  RagePublicKey rage_pub = 2;
}

// Response containing the encrypted key blob.
message DownloadMyKeyBlobResponse {
  // Age/Rage-encrypted blob (same as uploaded via UploadKeyBlobs).
  bytes blob = 1;
}

// --- Edge Access Token ---
//
// An EdgeAccessToken is a random 32-byte secret that controls read access
// to organization events at the Edge layer. It is rotated on every ring change
// (RingUpdate event) and distributed per-member via age encryption.
//
// Security model:
//   Layer 1: EdgeAccessToken — controls event READ access (at Edge)
//   Layer 2: Ring Signature  — controls event WRITE access (at Server)
//   Layer 3: k_shared        — controls event DECRYPTION (at Client)
//
// A removed member loses Layer 1 access (never receives new token),
// even though they retain Layers 2 (revoked by ring) and 3 (k_shared).

// An encrypted access token for a specific member.
message AccessTokenBlob {
  // Member's Rage (X25519) public key (32 bytes).
  RagePublicKey rage_pub = 1;

  // Age/Rage-encrypted ciphertext containing the EdgeAccessToken (32 bytes).
  // Only decryptable by the holder of the corresponding private key.
  bytes encrypted_token = 2;
}

// Request to upload access token blobs.
message UploadAccessTokenBlobsRequest {
  // Organization ID (ULID format) to upload blobs for.
  string org_id = 1;

  // List of access token blobs (one per current ring member).
  // Existing blobs for the same rage_pub are overwritten.
  repeated AccessTokenBlob blobs = 2;
}

// Empty response indicating successful upload.
message UploadAccessTokenBlobsResponse {}

// Request to download a member's access token blob.
message DownloadMyAccessTokenBlobRequest {
  // Organization ID (ULID format) to download from.
  string org_id = 1;

  // Member's Rage public key (32 bytes) identifying the blob to fetch.
  RagePublicKey rage_pub = 2;
}

// Response containing the encrypted access token.
message DownloadMyAccessTokenBlobResponse {
  // Age/Rage-encrypted access token (32 bytes when decrypted).
  // Decrypted token is included as `x-edge-access-token` gRPC metadata
  // (bs58-encoded) on read RPCs to Edge.
  bytes encrypted_token = 1;
}

// Request to get the raw Edge access token (Edge-only).
message GetEdgeAccessTokenRequest {
  // Organization ID (ULID format) to get the token for.
  string org_id = 1;
}

// Response containing raw access tokens for Edge enforcement.
message GetEdgeAccessTokenResponse {
  // Current valid access token (32 bytes).
  bytes current_token = 1;

  // Previous access token (32 bytes), empty if this is the first token.
  // Edge should accept both during a grace period after rotation.
  bytes previous_token = 2;

  // Unix timestamp (milliseconds) when the current token was generated.
  uint64 rotated_at_ms = 3;
}

