syntax = "proto3";
package mandate.v1;

import "common.proto";
import "error.proto";

// Enterprise-only: This service handles KYC/identity credential management
// and requires object storage (S3/MinIO/R2). Not included in community edition.
//
// CredentialService manages KYC credential uploads and admin verification for Standalone Mode.
//
// ## Authentication
// Requires `x-api-token` header with valid tenant token.
// Admin-only RPCs additionally verify admin role in the token.
// Exposed on the public gRPC listener.
//
// ## Upload Flow (Direct S3/MinIO Upload with Pre-Signed URLs)
// 1. Member requests pre-signed upload URL (RequestUploadUrl)
//    - System allocates credential_id (ULID) and generates pre-signed S3/MinIO URL
//    - Returns URL valid for 10-30 minutes
// 2. Member uploads file directly to object storage using pre-signed URL
//    - Large files (videos, high-res scans) upload directly to S3/MinIO/R2
//    - No backend proxy involvement, reducing server load and latency
// 3. Member confirms upload completion (ConfirmUpload)
//    - Sends SHA-256 file hash for integrity verification
//    - Credential status transitions to "pending_review"
// 4. Admin lists pending credentials (ListPendingCredentials)
// 5. Admin requests pre-signed download URL to view file (RequestDownloadUrl)
// 6. Admin reviews and approves/rejects credential (ReviewCredential)
//    - Optional cryptographic signature for audit trail
//
// ## Use Cases
// - Member uploads government ID (passport, driver's license) for identity verification
// - Member uploads organization membership proof (employee badge, certificate)
// - Member uploads KYC video for liveness detection
// - Admin reviews pending credentials and makes approval decisions
// - Admin downloads credential files for offline verification
// - Member checks their credential verification status
//
// ## Security Considerations
// - Pre-signed URLs expire after 10-30 minutes to prevent misuse
// - File hash verification ensures upload integrity
// - Admin-only RPCs verify admin role before granting access
// - Cryptographic signatures on ReviewCredential provide audit trail
// - File size limits prevent storage quota exhaustion
service CredentialService {
  // RequestUploadUrl generates a pre-signed URL for uploading a credential file directly to object storage.
  //
  // Called by a member to obtain a secure, time-limited URL for uploading large credential files
  // (e.g., government ID scans, videos) directly to S3/MinIO/R2 without proxying through backend.
  // The system pre-allocates a credential_id (ULID) and associates it with the member's pending_id.
  //
  // ## File Size Validation
  // - file_size is validated against tenant quota limits (e.g., 100MB for videos)
  // - Prevents DoS attacks via excessive storage consumption
  // - Returns max_file_size in response for client-side validation
  //
  // ## Idempotency
  // Each call generates a new credential_id and pre-signed URL.
  // No deduplication is performed. If the same file needs to be re-uploaded,
  // call RequestUploadUrl again to get a fresh URL.
  //
  // ## Errors
  // - INVALID_ARGUMENT: missing required fields, invalid credential_type, file_size exceeds quota
  // - NOT_FOUND: pending_id doesn't exist in database (if provided)
  // - RESOURCE_EXHAUSTED: member has reached credential upload quota
  // - INTERNAL: object storage URL generation failure, database error
  rpc RequestUploadUrl(RequestUploadUrlRequest) returns (RequestUploadUrlResponse);

  // ConfirmUpload marks a credential as uploaded after direct object storage upload succeeds.
  //
  // Called by the member after successfully uploading the file to the pre-signed URL.
  // Verifies file integrity via SHA-256 hash and transitions credential status to "pending_review".
  // The credential becomes visible to admins in ListPendingCredentials.
  //
  // ## Integrity Verification
  // - file_hash (SHA-256) is stored for audit trail
  // - Future enhancement: compare with object storage ETag for tamper detection
  //
  // ## Idempotency
  // Idempotent: multiple calls with same credential_id and file_hash succeed.
  // If file_hash differs, returns FAILED_PRECONDITION (indicates file was modified).
  //
  // ## Errors
  // - NOT_FOUND: credential_id doesn't exist or URL expired
  // - FAILED_PRECONDITION: file_hash mismatch (file tampered after URL generation)
  // - PERMISSION_DENIED: credential_id doesn't belong to caller's pending_id
  // - INTERNAL: database error
  rpc ConfirmUpload(ConfirmUploadRequest) returns (ConfirmUploadResponse);

  // GetCredentialStatus retrieves the verification status of a specific credential.
  //
  // Called by a member to check if their uploaded credential has been reviewed.
  // Returns current status (pending/approved/rejected) and review metadata.
  // Members can only query their own credentials.
  //
  // ## Errors
  // - NOT_FOUND: credential_id doesn't exist
  // - PERMISSION_DENIED: credential doesn't belong to caller's pending_id
  rpc GetCredentialStatus(GetCredentialStatusRequest) returns (GetCredentialStatusResponse);

  // ListPendingCredentials returns all credentials awaiting admin review for an organization.
  //
  // Admin-only RPC. Returns credentials with status = "pending" in chronological order
  // (oldest first, FIFO review queue). Supports pagination for organizations with many pending submissions.
  // Each credential summary includes pending_id, file metadata, and upload timestamp.
  //
  // ## Errors
  // - NOT_FOUND: org_id doesn't exist
  // - PERMISSION_DENIED: caller is not a tenant admin
  rpc ListPendingCredentials(ListPendingCredentialsRequest) returns (ListPendingCredentialsResponse);

  // ReviewCredential approves or rejects a credential submission.
  //
  // Admin-only RPC. Transitions credential status to "approved" or "rejected".
  // If rejected, admin must provide a rejection_reason for transparency.
  // Optional admin_signature provides cryptographic audit trail for compliance.
  //
  // ## Audit Signature
  // - admin_signature is a cryptographic signature over (credential_id, approved, rejection_reason, timestamp)
  // - Enables non-repudiation for sensitive approval decisions
  // - Signature verification is optional (future enhancement)
  //
  // ## Idempotency
  // Idempotent: re-reviewing with same decision (approved=true/false) succeeds.
  // Changing decision (approved -> rejected or vice versa) requires a new ReviewCredential call.
  //
  // ## Errors
  // - NOT_FOUND: credential_id doesn't exist
  // - INVALID_ARGUMENT: rejection_reason missing when approved=false
  // - PERMISSION_DENIED: caller is not a tenant admin
  // - FAILED_PRECONDITION: credential status is not "pending" (already reviewed)
  rpc ReviewCredential(ReviewCredentialRequest) returns (ReviewCredentialResponse);

  // RequestDownloadUrl generates a pre-signed URL for downloading a credential file from object storage.
  //
  // Admin-only RPC. Returns a time-limited URL (valid for 5-10 minutes) for viewing credential files.
  // Enables secure, audited access to sensitive documents without permanent public URLs.
  // Download URLs are single-use and expire quickly to prevent unauthorized sharing.
  //
  // ## Errors
  // - NOT_FOUND: credential_id doesn't exist or file not uploaded yet
  // - PERMISSION_DENIED: caller is not a tenant admin
  // - INTERNAL: object storage URL generation failure
  rpc RequestDownloadUrl(RequestDownloadUrlRequest) returns (RequestDownloadUrlResponse);
}

// Request to generate a pre-signed upload URL for a credential file.
message RequestUploadUrlRequest {
  // Type of credential being uploaded.
  // Predefined types: "government_id", "org_membership", "kyc_video"
  // Tenant-specific types allowed (e.g., "academic_transcript", "business_license")
  // Maximum length: 64 characters.
  string credential_type = 1;

  // Original file name from user's device.
  // Used for display in admin UI and audit logs.
  // Example: "passport_john_doe.pdf"
  // Maximum length: 256 characters.
  string file_name = 2;

  // File size in bytes.
  // Validated against tenant quota limits (e.g., 100MB for videos, 10MB for PDFs).
  // Must be > 0.
  int64 file_size = 3;

  // MIME type of the file.
  // Validated against allowed types for credential_type.
  // Examples: "application/pdf", "video/mp4", "image/jpeg"
  // Maximum length: 128 characters.
  string mime_type = 4;

  // Optional pending_id for linking credential to a pending member.
  // If provided, credential is associated with this pending_id.
  // If omitted, system uses pending_id from authentication token.
  // Format: ULID (26 characters).
  optional string pending_id = 5;
}

// Response containing pre-signed upload URL and credential metadata.
message RequestUploadUrlResponse {
  // Pre-allocated credential ID (ULID format) for tracking this upload.
  // Use this ID in ConfirmUpload after successful file upload.
  // Example: "01H3Z6J9K2M4N5P6Q7R8S9T0V1"
  string credential_id = 1;

  // Pre-signed S3/MinIO/R2 upload URL (PUT or POST method).
  // Valid for 10-30 minutes (exact duration in expires_at_ms).
  // Client MUST upload file before expiration.
  // Example: "https://s3.amazonaws.com/bucket/uploads/01H3Z6J9K2M4N5P6Q7R8S9T0V1?..."
  string upload_url = 2;

  // Unix timestamp in milliseconds when upload_url expires.
  // Client should show countdown timer to user.
  int64 expires_at_ms = 3;

  // Maximum allowed file size in bytes for this upload.
  // Client should validate file_size <= max_file_size before uploading.
  // Enforced by object storage policy if client bypasses check.
  int64 max_file_size = 4;
}

// Request to confirm a credential upload has completed.
message ConfirmUploadRequest {
  // Credential ID (ULID format) from RequestUploadUrl response.
  string credential_id = 1;

  // SHA-256 hash of the uploaded file (32 bytes).
  // Used for integrity verification and audit trail.
  // Client computes this locally before or during upload.
  // Format: raw bytes, not hex-encoded.
  bytes file_hash = 2;
}

// Response confirming upload completion.
message ConfirmUploadResponse {
  // Always true if operation succeeded.
  bool success = 1;

  // New status after confirmation (always "pending_review").
  // Indicates credential is now visible to admins in review queue.
  string status = 2;
}

// Request to query credential verification status.
message GetCredentialStatusRequest {
  // Credential ID (ULID format) to query.
  string credential_id = 1;
}

// Response containing credential verification status and metadata.
message GetCredentialStatusResponse {
  // Credential ID (ULID format) being queried.
  string credential_id = 1;

  // Type of credential (e.g., "government_id", "kyc_video").
  string credential_type = 2;

  // Current verification status.
  // Possible values: "pending", "approved", "rejected"
  // - "pending": awaiting admin review
  // - "approved": admin approved, member can proceed with registration
  // - "rejected": admin rejected, member must re-submit or contact support
  string status = 3;

  // Rejection reason if status = "rejected".
  // Examples: "Document expired", "Image quality too low", "Name mismatch"
  // Only set when status = "rejected".
  optional string rejection_reason = 4;

  // Unix timestamp in milliseconds when file was uploaded.
  int64 uploaded_at_ms = 5;

  // Unix timestamp in milliseconds when credential was reviewed.
  // Only set when status = "approved" or "rejected".
  optional int64 reviewed_at_ms = 6;
}

// Request to list pending credentials for admin review.
message ListPendingCredentialsRequest {
  // Organization ID (ULID format) to filter credentials.
  // Only credentials for pending members of this organization are returned.
  string org_id = 1;

  // Maximum number of credentials to return (server may cap this).
  // Recommended: 50. Maximum: 100.
  uint32 limit = 2;

  // Pagination cursor from previous response.
  // Pass empty/null for first page.
  PageToken page_token = 3;
}

// Summary of a credential for admin review list.
message CredentialSummary {
  // Credential ID (ULID format).
  string credential_id = 1;

  // Pending member ID (ULID format) who uploaded this credential.
  // Admin can use this to view member's full pending registration details.
  string pending_id = 2;

  // Type of credential (e.g., "government_id", "org_membership").
  string credential_type = 3;

  // Original file name provided by member.
  // Example: "passport_john_doe.pdf"
  string file_name = 4;

  // File size in bytes.
  int64 file_size = 5;

  // Current verification status (always "pending" in this list).
  string status = 6;

  // Unix timestamp in milliseconds when credential was uploaded.
  // Used for sorting (oldest first in review queue).
  int64 uploaded_at_ms = 7;
}

// Response containing list of pending credentials.
message ListPendingCredentialsResponse {
  // List of pending credentials in chronological order (oldest first).
  repeated CredentialSummary credentials = 1;

  // Pagination cursor for next page.
  // Empty if no more pages.
  PageToken next_page_token = 2;
}

// Request to approve or reject a credential.
message ReviewCredentialRequest {
  // Credential ID (ULID format) to review.
  string credential_id = 1;

  // Approval decision.
  // true = approve, false = reject.
  bool approved = 2;

  // Rejection reason if approved = false.
  // MUST be provided when approved = false for transparency.
  // Examples: "Document expired", "Image quality insufficient", "Name does not match registration"
  // Maximum length: 500 characters.
  optional string rejection_reason = 3;

  // Optional cryptographic signature for audit trail.
  // Signature over (credential_id || approved || rejection_reason || timestamp).
  // Format: raw bytes (e.g., Ed25519 signature, 64 bytes).
  // Verification is optional (future enhancement).
  optional bytes admin_signature = 4;
}

// Response after reviewing a credential.
message ReviewCredentialResponse {
  // Always true if operation succeeded.
  bool success = 1;

  // New status after review.
  // Possible values: "approved", "rejected"
  string new_status = 2;
}

// Request to generate a pre-signed download URL for a credential file.
message RequestDownloadUrlRequest {
  // Credential ID (ULID format) to download.
  string credential_id = 1;
}

// Response containing pre-signed download URL.
message RequestDownloadUrlResponse {
  // Pre-signed S3/MinIO/R2 download URL (GET method).
  // Valid for 5-10 minutes (exact duration in expires_at_ms).
  // Single-use recommended (though S3 doesn't enforce).
  // Example: "https://s3.amazonaws.com/bucket/credentials/01H3Z6J9K2M4N5P6Q7R8S9T0V1?..."
  string download_url = 1;

  // Unix timestamp in milliseconds when download_url expires.
  int64 expires_at_ms = 2;
}
