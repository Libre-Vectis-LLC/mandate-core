syntax = "proto3";
package mandate.v1;

import "common.proto";

service EventService {
  // Push a signed event to the server (bytes are canonical, include signature).
  rpc PushEvent (PushEventRequest) returns (PushEventResponse);

  // Stream events for a group, starting after an exclusive sequence.
  rpc StreamEvents (StreamEventsRequest) returns (stream StreamEventsResponse);
}

message PushEventRequest {
  bytes event_bytes = 1;
}

message PushEventResponse {
  string event_id = 1; // ULID string
  int64 sequence_no = 2;
}

message StreamEventsRequest {
  string group_id = 1;       // ULID
  int64 start_sequence_no = 2; // exclusive (start > this)
  uint32 limit = 3;            // server may chunk smaller
}

message StreamEventsResponse {
  repeated bytes event_bytes = 1; // batch to reduce per-message overhead
}
